name = "carbonink-cloud-api"
main = "src/index.ts"
compatibility_date = "2025-05-01"

# Single-domain routing: this worker handles every `/api/*` path under
# carbonink.xyz. The entrypoint strips the `/api` prefix so existing
# handlers (matching `/v1/*`) keep working.
routes = [
  { pattern = "carbonink.xyz/api/*", zone_name = "carbonink.xyz" },
]
# No nodejs_compat needed: we use @noble/curves (pure-JS WebCrypto-based)
# for Ed25519 and raw fetch() calls (no stripe SDK) for Stripe + Resend.
# If a future contributor adds the `stripe` npm package, they MUST also
# add `compatibility_flags = ["nodejs_compat"]` here and re-measure the
# bundle size against the free-tier limit (see Task 10 Step 4).

# ---------- D1 ----------
[[d1_databases]]
binding = "DB"
database_name = "carbonink-cloud"
database_id = "619f574d-66f6-4e80-96db-1a6b4b9f0a85"
migrations_dir = "migrations"

# ---------- KV ----------
[[kv_namespaces]]
binding = "LICENSE_ACTIVE"
id = "33e285bd98d9481a9e7348d65a94ac2d"

[[kv_namespaces]]
binding = "REVOCATION_SET"
id = "6abdfab8a2dd486fa98f3d565359d15f"

[[kv_namespaces]]
binding = "HUMANIZED_KEYS"
id = "07b513881b2a4457a91226def7201504"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "0ad669c5d04549cc90ab98eeb6329b84"

# ---------- R2 ----------
[[r2_buckets]]
binding = "RELEASES"
bucket_name = "carbonink-releases"

# ---------- Email Sending (Cloudflare native — no API key) ----------
# Requires the zone to be onboarded first:
#   pnpm exec wrangler email sending enable carbonink.xyz
[[send_email]]
name = "EMAIL"

# ---------- Secrets (never in this file — set via wrangler secret put) ----------
# LICENSE_PRIVATE_KEY_HEX   — Ed25519 64-byte hex (seed+pubkey) for @noble/ed25519
# SESSION_PRIVATE_KEY_HEX   — Separate Ed25519 key for account portal session JWTs
# STRIPE_SECRET_KEY          — Stripe secret key
# STRIPE_WEBHOOK_SECRET      — Stripe webhook signing secret

[vars]
ENVIRONMENT = "development"
STRIPE_PUBLISHABLE_KEY = "pk_test_placeholder"
STRIPE_PRICE_BASE_2026Q2 = "price_placeholder_replace_in_prod"
# Single magic-link email allowed to access /v1/admin/* routes.
# Anyone who magic-link-logs-in as this address gets admin role;
# the value itself isn't a secret (knowing the email doesn't grant
# access — you also need a valid session JWT signed by
# SESSION_PRIVATE_KEY_HEX).
ADMIN_EMAIL = "admin@carbonink.xyz"

# ---------- Cron triggers ----------
[triggers]
crons = ["0 3 * * *"]   # 03:00 UTC every day — revocation sweep
