# Single carbonink-cloud web worker — serves everything under
# carbonink.xyz/* except `/api/*` (that goes to carbonink-cloud-api,
# a separate worker for the backend).
#
# Before the 3-site merge this was 3 Astro workers (marketing static,
# activate SSR, account SSR). The merge collapsed them into one
# hybrid Astro site:
#
#   prerendered routes (CDN):  /, /pricing, /download, /privacy + their /en/* mirrors
#   SSR routes:                /activate, /account/*, /en/activate, /en/account/*
#
# Astro 6's @astrojs/cloudflare adapter injects the Worker entry
# (`main`) at build time pointing to `dist/_worker.js/index.js`, so
# `main` is intentionally absent here. Putting it in this file
# triggers the bundled @cloudflare/vite-plugin to resolve the path
# BEFORE astro produces it, which fails.

name = "carbonink-cloud-web"
compatibility_date = "2025-05-23"
compatibility_flags = ["nodejs_compat"]

# Catch-all under carbonink.xyz. More-specific routes (just /api/*
# after the merge) win via longest-prefix matching, so this captures
# every non-API URL on the zone.
routes = [
  { pattern = "carbonink.xyz/*", zone_name = "carbonink.xyz" },
]

[assets]
directory = "./dist"

# (The `env.API` service binding to carbonink-cloud-api was removed with the
# open-source pivot — the SSR account/admin/activate pages that used it are gone,
# and the remaining marketing pages are prerendered. This decouples the web worker
# from the retired API worker so it stays deployable after the API worker is torn
# down.)

# Secrets needed by SSR routes:
#   STRIPE_SECRET_KEY   — used by /activate to resolve a Stripe
#                         checkout session into an email + license key
# Set via:
#   pnpm --filter @carbonink-cloud/web exec wrangler secret put STRIPE_SECRET_KEY
