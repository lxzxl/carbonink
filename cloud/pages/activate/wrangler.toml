# Activate page — SSR via @astrojs/cloudflare v13. Astro builds
# `dist/_worker.js/index.js` (entry) + `dist/_astro/`, `dist/<html>`
# (static assets). Workers Static Assets binding serves anything not
# matched by `main`'s router; SSR routes go through `main`.
#
# Production domain: activate.carbonbook.app
#
# Secrets set via `wrangler secret put`:
#   STRIPE_SECRET_KEY   — Stripe API key for session lookup

name = "carbonbook-activate"
# `main` is intentionally absent — @astrojs/cloudflare v13 injects it
# at build time pointing to `dist/_worker.js/index.js`. Putting it
# here triggers the bundled @cloudflare/vite-plugin to try resolving
# the path BEFORE astro produces it, which fails.
compatibility_date = "2025-05-23"
compatibility_flags = ["nodejs_compat"]

[vars]
API_ORIGIN = "https://api.carbonbook.app"

[assets]
directory = "./dist"
binding = "ASSETS"
