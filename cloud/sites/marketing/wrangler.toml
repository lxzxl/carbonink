# Marketing site — pure static (no SSR), deployed as Cloudflare Worker
# with the Static Assets binding (the modern replacement for Cloudflare
# Pages — see CLAUDE.md → Repo layout). No `main` because there's no
# runtime code: Astro builds `dist/` and wrangler serves it directly.
#
# Catch-all at carbonbook.app: more-specific routes (/api/*, /activate,
# /account) win via Cloudflare's longest-prefix match, so this only
# serves what's left over (marketing pages, /pricing, /download, etc.).

name = "carbonbook-marketing"
compatibility_date = "2025-05-23"

routes = [
  { pattern = "carbonbook.app/*", zone_name = "carbonbook.app" },
]

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
