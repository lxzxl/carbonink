name: Release

# Unsigned, open-source release pipeline.
#
# Tag push (v*) → build mac (arm64 + x64 .dmg) + win (x64 .exe) installers on
# CI runners → attach to a GitHub Release. The marketing site's /download/*
# endpoints resolve the latest release asset at request time (see
# cloud/web/src/lib/latest-download.ts), so a fresh release is picked up with
# no site rebuild.
#
# NOT code-signed: the licensing + Apple/Azure signing + R2 infra was removed in
# the open-source pivot, and those secrets are gone. macOS shows "unidentified
# developer" (right-click → Open); Windows SmartScreen shows "More info → Run
# anyway". The download page documents this. electron-builder ad-hoc signs the
# mac .app (no `identity`), and build/sign-windows.js self-skips when Azure env
# is absent — so both build cleanly unsigned.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Create the draft release FIRST so the two platform builds upload into it
  # rather than racing to create the same tag's release (parallel "create if
  # missing" calls collide → 422).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release for tag
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        working-directory: desktop
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          pnpm version --no-git-tag-version "$VERSION"

      - name: Build + package (unsigned — notarize off, ad-hoc sign)
        working-directory: desktop
        run: pnpm build && pnpm exec electron-builder --mac --publish never

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*.dmg
          draft: true

  build-win:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set version from tag
        working-directory: desktop
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          pnpm version --no-git-tag-version $version

      - name: Build + package (unsigned — Azure sign hook self-skips with no creds)
        working-directory: desktop
        run: pnpm build && pnpm exec electron-builder --win --publish never

      - name: Upload installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/release/*.exe
          draft: true

  publish-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
